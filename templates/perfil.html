<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding-bottom:70px;}
    .container { max-width:500px; margin:40px auto; background:white; padding:20px; border-radius:10px;}
    .perfil-item { display:flex; justify-content:space-between; margin:10px 0; }
    .perfil-item span { font-weight:bold; }
    .editar { cursor:pointer; color:#4f46e5; margin-left:10px; }
    button { margin-top:20px; padding:10px 15px; background:#4f46e5; color:white; border:none; border-radius:6px; cursor:pointer;}
    footer { position:fixed; bottom:0;width:100%; background:#111; display:flex; justify-content:space-around; padding:12px 0; }
    footer button { background:none; border:none; color:white; font-size:16px; cursor:pointer; }
    h1 { text-align:center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDGj4fZsXO4Oo_6aahUKffJfJi0RPUWI74",
      authDomain: "projeto-pap-284ca.firebaseapp.com",
      projectId: "projeto-pap-284ca",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    function Perfil() {
      const [user,setUser] = React.useState(null);
      const [perfil,setPerfil] = React.useState({ nome:"", nascimento:"", genero:"", email:"" });
      const [loading,setLoading] = React.useState(true);

      React.useEffect(() => {
        const unsub = auth.onAuthStateChanged(async u => {
          if(!u){ window.location.href="/"; return; }
          setUser(u);
          const snap = await db.collection("users").doc(u.uid).get();
          if(snap.exists) setPerfil({...perfil,...snap.data(), email:u.email});
          setLoading(false);
        });
        return () => unsub();
      }, []);

      const handleChange = e => setPerfil({...perfil, [e.target.name]: e.target.value});

      const salvarPerfil = async () => {
        if(!user) return;
        await db.collection("users").doc(user.uid).set({...perfil,email:user.email, atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        alert("Perfil guardado!");
      };

      if(loading) return <p style={{textAlign:"center"}}>A carregar...</p>;

      return (
        <>
          <div className="container">
            <h1>O teu perfil</h1>

            <div className="perfil-item">
              <span>Nome:</span>
              <input type="text" name="nome" value={perfil.nome} onChange={handleChange}/>
            </div>

            <div className="perfil-item">
              <span>Data de nascimento:</span>
              <input type="date" name="nascimento" value={perfil.nascimento} onChange={handleChange}/>
            </div>

            <div className="perfil-item">
              <span>Género:</span>
              <select name="genero" value={perfil.genero} onChange={handleChange}>
                <option value="">Seleciona o género</option>
                <option value="Feminino">Feminino</option>
                <option value="Masculino">Masculino</option>
                <option value="Outro">Outro</option>
              </select>
            </div>

            <div className="perfil-item">
              <span>Email:</span>
              <span>{perfil.email}</span>
            </div>

            <div className="perfil-item">
              <span>ID do utilizador:</span>
              <span>{user.uid}</span>
            </div>

            <button onClick={salvarPerfil}>Guardar</button>
          </div>

          <footer>
            <button onClick={() => window.location.href="/chat"}>💬 Chat</button>
            <button onClick={() => window.location.href="/perfil"}>👤 Perfil</button>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Perfil />);
  </script>
</body>
</html>
