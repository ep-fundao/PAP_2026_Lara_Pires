<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Completa o teu perfil</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding-bottom:70px;}
    .container { max-width: 400px; margin: 40px auto; background:white; padding:20px; border-radius:10px; }
    input, select, button { width:100%; margin-top:10px; padding:10px; font-size:14px; }
    button { background:#4f46e5; color:white; border:none; border-radius:6px; cursor:pointer; }
    h1 { text-align:center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDGj4fZsXO4Oo_6aahUKffJfJi0RPUWI74",
      authDomain: "projeto-pap-284ca.firebaseapp.com",
      projectId: "projeto-pap-284ca",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    function PerfilCadastro() {
      const [user, setUser] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [perfil, setPerfil] = React.useState({ nome:"", nascimento:"", genero:"" });

      React.useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          if(!u) { window.location.href="/"; return; }
          setUser(u);
          setLoading(false);
        });
        return () => unsub();
      }, []);

      const handleChange = e => setPerfil({...perfil, [e.target.name]: e.target.value });

      const salvarPerfil = async (e) => {
        e.preventDefault();
        if(!user) return;
        await db.collection("users").doc(user.uid).set({
          ...perfil,
          email: user.email,
          criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge:true });
        window.location.href="/perfil"; // depois vai para perfil normal
      };

      if(loading) return <p style={{textAlign:"center"}}>A carregar...</p>;

      return (
        <div className="container">
          <h1>Completa o teu perfil</h1>
          <form onSubmit={salvarPerfil}>
            <input name="nome" placeholder="Nome" value={perfil.nome} onChange={handleChange} required/>
            <input type="date" name="nascimento" value={perfil.nascimento} onChange={handleChange} required/>
            <select name="genero" value={perfil.genero} onChange={handleChange} required>
              <option value="">Seleciona o género</option>
              <option value="Feminino">Feminino</option>
              <option value="Masculino">Masculino</option>
              <option value="Outro">Outro</option>
            </select>
            <button type="submit">Guardar</button>
          </form>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PerfilCadastro />);
  </script>
</body>
</html>
